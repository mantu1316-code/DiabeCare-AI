<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Diabetes AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4fafd; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: white; border-radius: 32px; padding: 40px; width: 100%; max-width: 400px; margin: 20px; box-shadow: 0 12px 28px rgba(0,0,0,0.08); position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; background: #eef2f5; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; color: #5f7f8f; font-size: 1.2rem; }
        .close-btn:hover { background: #d0dfe6; color: #0a4c5c; transform: rotate(90deg); }
        h2 { color: #0a4c5c; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border-radius: 40px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        button { background: #0a4c5c; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; }
        .error { color: #d9534f; margin-top: 10px; text-align: center; }
        .success { color: #28a745; text-align: center; }
    </style>
</head>
<body>
<div class="auth-card">
    <button class="close-btn" onclick="window.location.href='index.html'"><i class="fas fa-times"></i></button>
    <h2>Reset Password</h2>
    <p>Enter your registered email to receive OTP</p>
    <input type="email" id="email" placeholder="Email address">
    <button id="sendOtpBtn">Send OTP</button>
    <div id="message"></div>
    <div style="margin-top: 15px; text-align: center;"><a href="login.html">Back to Login</a></div>
</div>
<script>
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:5000' 
        : 'https://YOUR-DIABETES-BACKEND.onrender.com';

    document.getElementById('sendOtpBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const msgDiv = document.getElementById('message');
        if (!email) { msgDiv.innerHTML = '<span class="error">Enter your email</span>'; return; }
        try {
            const res = await fetch(`${API_BASE_URL}/api/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (res.ok) {
                msgDiv.innerHTML = '<span class="success">OTP sent! Redirecting...</span>';
                setTimeout(() => { window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`; }, 1500);
            } else { msgDiv.innerHTML = '<span class="error">' + data.message + '</span>'; }
        } catch (err) { msgDiv.innerHTML = '<span class="error">Server error</span>'; }
    });
</script>
</body>
</html>
